<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Centre for Regulatory Studies Icon">
  <defs>
    <style>
      .icon-block { fill: #1a2332; }
      .icon-block-accent { fill: #BFA978; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="#F2F0E9"/>

  <!-- Simplified Geometric Grid Pattern (3x3) for favicon -->
  <g id="icon-mark" transform="translate(10, 10)">
    <!-- Top Row -->
    <rect class="icon-block" x="0" y="0" width="22" height="22" rx="2"/>
    <rect class="icon-block-accent" x="29" y="0" width="22" height="22" rx="2"/>
    <rect class="icon-block" x="58" y="0" width="22" height="22" rx="2"/>

    <!-- Middle Row -->
    <rect class="icon-block" x="0" y="29" width="22" height="22" rx="2"/>
    <rect class="icon-block-accent" x="29" y="29" width="22" height="22" rx="2"/>
    <rect class="icon-block" x="58" y="29" width="22" height="22" rx="2"/>

    <!-- Bottom Row -->
    <rect class="icon-block" x="0" y="58" width="22" height="22" rx="2"/>
    <rect class="icon-block-accent" x="29" y="58" width="22" height="22" rx="2"/>
    <rect class="icon-block" x="58" y="58" width="22" height="22" rx="2"/>
  </g>
</svg>
